<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error Page</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #020617, #0f172a);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 700px;
      background: rgba(255,255,255,0.05);
      padding: 50px;
      border-radius: 25px;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
    }

    h1 {
      font-size: 7rem;
      color: #38bdf8;
      margin-bottom: 20px;
    }

    h2 {
      font-size: 2rem;
      margin-bottom: 20px;
    }

    p {
      color: #cbd5e1;
      line-height: 1.8;
      margin-bottom: 30px;
    }

    a {
      text-decoration: none;
      background: #38bdf8;
      color: #020617;
      padding: 15px 35px;
      border-radius: 50px;
      font-weight: bold;
    }

  </style>

</head>
<body>

  <div class="container">

    <h1>404</h1>

    <h2>Oops! Page Not Found</h2>

    <p>
      The page you are looking for does not exist or may have been moved.
      Please return to the homepage.
    </p>

    <a href="index.html">Go Back Home</a>

  </div>

</body>
</html>
